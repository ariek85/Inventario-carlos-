<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventarios</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F5F0E8; --surface: #FDFAF4; --border: #D4C9B0;
    --text: #1A1410; --muted: #7A6E5F; --accent: #C4401A;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Mono', monospace; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem 1rem; }
  h1 { font-family: 'DM Serif Display', serif; font-size: 2.6rem; letter-spacing: -0.02em; margin-bottom: 0.4rem; text-align: center; }
  .sub { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 2.5rem; }
  .grid { display: grid; gap: 1rem; width: 100%; max-width: 720px; grid-template-columns: 1fr 1fr; }
  a.card { display: block; background: var(--surface); border: 1px solid var(--border); padding: 1.6rem 1.5rem; text-decoration: none; color: var(--text); transition: border-color 0.15s, transform 0.15s; }
  a.card:hover { border-color: var(--text); transform: translateY(-2px); }
  .card .name { font-family: 'DM Serif Display', serif; font-size: 1.4rem; margin-bottom: 0.5rem; }
  .card .desc { font-size: 0.78rem; color: var(--muted); line-height: 1.5; }
  .card .go { margin-top: 1.1rem; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--accent); }
  @media (max-width: 560px) { .grid { grid-template-columns: 1fr; } h1 { font-size: 2rem; } }
</style>
</head>
<body>
  <h1>Inventarios</h1>
  <div class="sub">Almacén · Control de existencias</div>
  <div class="grid">
    <a class="card" href="./inventario-telas.html">
      <div class="name">Telas</div>
      <div class="desc">Entradas, salidas y devoluciones por metros y rollos.</div>
      <div class="go">Abrir →</div>
    </a>
    <a class="card" href="./inventario-materia-prima.html">
      <div class="name">Materia Prima</div>
      <div class="desc">776 artículos por clave y descripción, con cantidad y unidad.</div>
      <div class="go">Abrir →</div>
    </a>
  </div>
</body>
</html>
