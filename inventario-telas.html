<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventario de Telas</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F5F0E8; --surface: #FDFAF4; --border: #D4C9B0;
    --text: #1A1410; --muted: #7A6E5F; --accent: #C4401A;
    --accent-soft: #F5E8E3; --green: #2D6A4F; --green-soft: #E3F0EA;
    --yellow: #A07800; --yellow-soft: #FAF3DC;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Mono', monospace; background: var(--bg); color: var(--text); min-height: 100vh; padding: 2rem 1rem; }
  header { max-width: 900px; margin: 0 auto 2.5rem; display: flex; align-items: baseline; justify-content: space-between; border-bottom: 2px solid var(--text); padding-bottom: 1rem; }
  header h1 { font-family: 'DM Serif Display', serif; font-size: 2.2rem; letter-spacing: -0.02em; }
  header span { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }
  .container { max-width: 900px; margin: 0 auto; }
  .summary { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 2rem; }
  .card { background: var(--surface); border: 1px solid var(--border); padding: 1.2rem 1.4rem; }
  .card-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted); margin-bottom: 0.5rem; }
  .card-value { font-family: 'DM Serif Display', serif; font-size: 2rem; line-height: 1; }
  .card-sub { font-size: 0.7rem; color: var(--muted); margin-top: 0.3rem; }
  .form-section { background: var(--surface); border: 1px solid var(--border); padding: 1.5rem; margin-bottom: 2rem; }
  .form-title { font-family: 'DM Serif Display', serif; font-size: 1.2rem; margin-bottom: 1.2rem; }
  .form-grid { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 0.75rem; align-items: end; }
  .field label { display: block; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 0.4rem; }
  .field input, .field select { width: 100%; padding: 0.6rem 0.8rem; border: 1px solid var(--border); background: var(--bg); font-family: 'DM Mono', monospace; font-size: 0.85rem; color: var(--text); outline: none; }
  .field input:focus, .field select:focus { border-color: var(--text); }
  .btn { padding: 0.65rem 1.2rem; font-family: 'DM Mono', monospace; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.08em; cursor: pointer; border: none; transition: opacity 0.15s; }
  .btn:hover { opacity: 0.8; }
  .btn-primary { background: var(--text); color: var(--bg); width: 100%; margin-top: 1rem; }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
  .tabs { display: flex; margin-bottom: 1rem; border-bottom: 2px solid var(--border); }
  .tab { padding: 0.6rem 1.2rem; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; cursor: pointer; border: none; background: none; color: var(--muted); font-family: 'DM Mono', monospace; border-bottom: 2px solid transparent; margin-bottom: -2px; }
  .tab.active { color: var(--text); border-bottom-color: var(--text); }
  .search-bar { margin-bottom: 1.5rem; }
  .search-bar input { width: 100%; padding: 0.65rem 1rem; border: 1px solid var(--border); background: var(--surface); font-family: 'DM Mono', monospace; font-size: 0.85rem; color: var(--text); outline: none; }
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
  th { text-align: left; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); padding: 0.5rem 0.8rem; border-bottom: 1px solid var(--border); white-space: nowrap; }
  td { padding: 0.65rem 0.8rem; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--bg); }
  .badge { display: inline-block; padding: 0.2rem 0.6rem; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.08em; }
  .badge-entrada { background: var(--green-soft); color: var(--green); }
  .badge-salida { background: var(--accent-soft); color: var(--accent); }
  .badge-devolucion { background: var(--yellow-soft); color: var(--yellow); }
  .del-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1rem; padding: 0.2rem 0.4rem; opacity: 0.5; }
  .del-btn:hover { opacity: 1; color: var(--accent); }
  .empty { text-align: center; padding: 3rem; color: var(--muted); font-size: 0.8rem; letter-spacing: 0.1em; text-transform: uppercase; }
  .catalog-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1rem; }
  .catalog-card { background: var(--surface); border: 1px solid var(--border); padding: 1.2rem; }
  .catalog-name { font-family: 'DM Serif Display', serif; font-size: 1.1rem; margin-bottom: 0.8rem; }
  .catalog-stat { font-size: 0.75rem; color: var(--muted); margin-bottom: 0.3rem; }
  .catalog-stat span { color: var(--text); font-weight: 500; }
  .toast { position: fixed; bottom: 1.5rem; right: 1.5rem; background: var(--text); color: var(--bg); padding: 0.75rem 1.2rem; font-size: 0.75rem; letter-spacing: 0.08em; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
  .toast.show { opacity: 1; }
  @media (max-width: 600px) {
    .form-grid { grid-template-columns: 1fr 1fr; }
    .summary { grid-template-columns: 1fr; }
    header { flex-direction: column; gap: 0.3rem; }
  }
</style>
</head>
<body>

<header>
  <h1>Inventario de Telas</h1>
  <span id="date-display"></span>
</header>

<div class="container">
  <div class="summary">
    <div class="card">
      <div class="card-label">Total Metros</div>
      <div class="card-value" id="sum-metros">—</div>
      <div class="card-sub">en existencia</div>
    </div>
    <div class="card">
      <div class="card-label">Total Rollos</div>
      <div class="card-value" id="sum-rollos">—</div>
      <div class="card-sub">en existencia</div>
    </div>
    <div class="card">
      <div class="card-label">Tipos de Tela</div>
      <div class="card-value" id="sum-tipos">—</div>
      <div class="card-sub">productos distintos</div>
    </div>
  </div>

  <div class="form-section">
    <div class="form-title">+ Registrar Movimiento</div>
    <div class="form-grid">
      <div class="field">
        <label>Nombre de la Tela</label>
        <input type="text" id="f-nombre" placeholder="Ej: Algodón blanco" list="telas-list">
        <datalist id="telas-list"></datalist>
      </div>
      <div class="field">
        <label>Tipo</label>
        <select id="f-tipo">
          <option value="entrada">Entrada</option>
          <option value="salida">Salida</option>
          <option value="devolucion">Devolución</option>
        </select>
      </div>
      <div class="field">
        <label>Metros</label>
        <input type="number" id="f-metros" placeholder="0.00" min="0" step="0.01">
      </div>
      <div class="field">
        <label>Rollos</label>
        <input type="number" id="f-rollos" placeholder="0" min="0" step="1">
      </div>
    </div>
    <input type="text" id="f-nota" placeholder="Nota opcional..." style="width:100%;margin-top:0.75rem;padding:0.6rem 0.8rem;border:1px solid var(--border);background:var(--bg);font-family:'DM Mono',monospace;font-size:0.85rem;outline:none;">
    <button class="btn btn-primary" id="btn-add" onclick="addMovimiento()">Registrar</button>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="showTab('movimientos', this)">Movimientos</button>
    <button class="tab" onclick="showTab('catalogo', this)">Catálogo</button>
  </div>

  <div id="tab-movimientos">
    <div class="search-bar">
      <input type="text" id="search" placeholder="Buscar por tela..." oninput="renderTable()">
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr><th>Fecha</th><th>Tela</th><th>Tipo</th><th>Metros</th><th>Rollos</th><th>Nota</th><th></th></tr>
        </thead>
        <tbody id="tabla-body"><tr><td colspan="7" class="empty">Cargando...</td></tr></tbody>
      </table>
    </div>
  </div>

  <div id="tab-catalogo" style="display:none">
    <div id="catalogo-grid" class="catalog-grid"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const API = 'https://script.google.com/macros/s/AKfycbym2RkE-JxlcA7C5A4xVdtTiJ92IMbgP-o7KVy4TrSA-6TqIK-Scobb-9O2NblMfBQsng/exec';
  let DATA = [];

  document.getElementById('date-display').textContent = new Date().toLocaleDateString('es-MX', { weekday:'long', year:'numeric', month:'long', day:'numeric' });

  function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  function buildUrl(params) {
    const qs = Object.entries(params).map(([k,v]) => `${encodeURIComponent(k)}=${encodeURIComponent(v)}`).join('&');
    return `${API}?${qs}`;
  }

  async function api(params) {
    const res = await fetch(buildUrl(params));
    const text = await res.text();
    try {
      return JSON.parse(text);
    } catch(e) {
      console.error('Respuesta no-JSON del servidor:', text);
      throw new Error('Respuesta inválida: ' + text.substring(0, 200));
    }
  }

  async function loadData() {
    try {
      const json = await api({ action: 'list' });
      DATA = json.data || [];
      render();
    } catch(e) {
      toast('Error al cargar: ' + e.message);
      document.getElementById('tabla-body').innerHTML = `<tr><td colspan="7" class="empty">Error al conectar</td></tr>`;
    }
  }

  async function addMovimiento() {
    const nombre = document.getElementById('f-nombre').value.trim();
    const tipo = document.getElementById('f-tipo').value;
    const metros = parseFloat(document.getElementById('f-metros').value) || 0;
    const rollos = parseInt(document.getElementById('f-rollos').value) || 0;
    const nota = document.getElementById('f-nota').value.trim();

    if (!nombre) { alert('Escribe el nombre de la tela.'); return; }
    if (metros === 0 && rollos === 0) { alert('Agrega metros o rollos.'); return; }

    const btn = document.getElementById('btn-add');
    btn.disabled = true;
    btn.textContent = 'Guardando...';

    try {
      await api({ action: 'add', id: Date.now(), fecha: new Date().toISOString(), nombre, tipo, metros, rollos, nota });
      document.getElementById('f-nombre').value = '';
      document.getElementById('f-metros').value = '';
      document.getElementById('f-rollos').value = '';
      document.getElementById('f-nota').value = '';
      toast('Registrado ✓');
      await loadData();
    } catch(e) {
      toast('Error: ' + e.message);
      console.error('Error al guardar:', e);
    }
    btn.disabled = false;
    btn.textContent = 'Registrar';
  }

  async function deleteMovimiento(id) {
    if (!confirm('¿Eliminar este movimiento?')) return;
    try {
      await api({ action: 'delete', id });
      toast('Eliminado ✓');
      await loadData();
    } catch(e) {
      toast('Error al eliminar.');
    }
  }

  function calcInventario() {
    const inv = {};
    DATA.forEach(d => {
      if (!inv[d.nombre]) inv[d.nombre] = { metros: 0, rollos: 0 };
      const sign = d.tipo === 'salida' ? -1 : 1;
      inv[d.nombre].metros += sign * (parseFloat(d.metros) || 0);
      inv[d.nombre].rollos += sign * (parseInt(d.rollos) || 0);
    });
    return inv;
  }

  function renderTable() {
    const search = document.getElementById('search').value.toLowerCase();
    const filtered = search ? DATA.filter(d => d.nombre.toLowerCase().includes(search)) : DATA;
    const sorted = [...filtered].reverse();
    const body = document.getElementById('tabla-body');
    if (sorted.length === 0) {
      body.innerHTML = `<tr><td colspan="7" class="empty">Sin movimientos</td></tr>`;
      return;
    }
    body.innerHTML = sorted.map(d => {
      const fecha = new Date(d.fecha).toLocaleDateString('es-MX', { day:'2-digit', month:'short', year:'2-digit' });
      const metros = parseFloat(d.metros) || 0;
      const rollos = parseInt(d.rollos) || 0;
      return `<tr>
        <td style="color:var(--muted)">${fecha}</td>
        <td><strong>${d.nombre}</strong></td>
        <td><span class="badge badge-${d.tipo}">${d.tipo}</span></td>
        <td>${metros > 0 ? metros.toFixed(2) + ' m' : '—'}</td>
        <td>${rollos > 0 ? rollos : '—'}</td>
        <td style="color:var(--muted);font-size:0.75rem">${d.nota || ''}</td>
        <td><button class="del-btn" onclick="deleteMovimiento(${d.id})">✕</button></td>
      </tr>`;
    }).join('');
  }

  function render() {
    const inv = calcInventario();
    renderTable();
    const keys = Object.keys(inv);
    document.getElementById('catalogo-grid').innerHTML = keys.length === 0
      ? '<div class="empty" style="grid-column:1/-1">Sin productos</div>'
      : keys.map(k => `
        <div class="catalog-card">
          <div class="catalog-name">${k}</div>
          <div class="catalog-stat">Metros: <span>${inv[k].metros.toFixed(2)} m</span></div>
          <div class="catalog-stat">Rollos: <span>${inv[k].rollos}</span></div>
        </div>`).join('');
    const totalMetros = keys.reduce((s, k) => s + Math.max(0, inv[k].metros), 0);
    const totalRollos = keys.reduce((s, k) => s + Math.max(0, inv[k].rollos), 0);
    document.getElementById('sum-metros').textContent = totalMetros.toFixed(1);
    document.getElementById('sum-rollos').textContent = totalRollos;
    document.getElementById('sum-tipos').textContent = keys.length;
    document.getElementById('telas-list').innerHTML = keys.map(k => `<option value="${k}">`).join('');
  }

  function showTab(tab, btn) {
    document.getElementById('tab-movimientos').style.display = tab === 'movimientos' ? 'block' : 'none';
    document.getElementById('tab-catalogo').style.display = tab === 'catalogo' ? 'block' : 'none';
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
  }

  loadData();
</script>
</body>
</html>
